<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Congrats Kish & Kerry</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/gsap.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            height: 100%;
            overflow: hidden;
            background-color: #fff;
            position: relative;
        }
        .container {
            display: flex;
            height: 100%;
        }
        .image-container {
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        .image-left, .image-right {
            width: 100%;
            height: 100%;
            position: absolute;
            background-size: cover;
            background-position: center;
        }
        .image-left {
            left: -100%;
            background-image: url('https://horuspatel.github.io/kishwedding/Kish.jpg');
        }
        .image-right {
            right: -100%;
            background-image: url('https://horuspatel.github.io/kishwedding/Kerry.jpg');
        }
        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #fff;
            z-index: 10;
            opacity: 0;
            background-color: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
        }
        h1 {
            font-size: 4em;
            margin-bottom: 0.5em;
            font-weight: 700;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.7);
            letter-spacing: 1px;
            color: #f40000;
        }
        p {
            font-size: 2em;
            margin-bottom: 1em;
            font-weight: 300;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
            color: #fff;
        }
        .nav {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column; /* Stack buttons vertically */
            align-items: flex-end; /* Align buttons to the right */
        }
        .nav a {
            color: #f40000;
            text-decoration: none;
            margin: 10px 0;
            font-size: 1.5em;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            padding: 10px 15px;
            background-color: #fff;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: auto; /* Prevent buttons from stretching */
            text-align: center;
        }
        .nav a:hover {
            color: #fff;
            background-color: #f40000;
            text-shadow: none;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            h1 {
                font-size: 3em;
            }
            p {
                font-size: 1.5em;
            }
            .nav a {
                font-size: 1.2em;
                padding: 8px 12px;
                width: auto; /* Keep buttons compact on mobile */
            }
            .content {
                padding: 30px;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 2.5em;
            }
            p {
                font-size: 1.2em;
            }
            .nav a {
                font-size: 1em;
                padding: 8px 12px;
                width: auto; /* Keep buttons compact on very small screens */
            }
            .content {
                padding: 20px;
            }
            .container {
                flex-direction: column;
            }
            .image-container {
                height: 50%;
            }
            .nav {
                bottom: 20px;
                right: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="image-container">
            <div class="image-left"></div>
        </div>
        <div class="image-container">
            <div class="image-right"></div>
        </div>
    </div>
    <div class="content">
        <h1>Kish & Kerry</h1>
        <p>They're FINALLY Getting Married!</p>
        <p>30th August 2024</p>
    </div>
    <div class="nav">
        <a href="#" id="homeLink">Home</a>
        <a href="gift.html" id="giftLink">Our Gift</a>
        <a href="images.html" id="imagesLink">View Images</a> <!-- New Link for Images Page -->
    </div>

    <!-- Tiny GIFs -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            gsap.to('.image-left', { left: 0, duration: 2, ease: 'power2.out' });
            gsap.to('.image-right', { right: 0, duration: 2, ease: 'power2.out' });
            gsap.to('.content', { opacity: 1, delay: 1.5, duration: 1 });
            gsap.to('.nav a', { opacity: 1, delay: 2, duration: 1, stagger: 0.2 });

            function createGif() {
                const gifElement = document.createElement('img');
                gifElement.src = 'https://horuspatel.github.io/kishwedding/chickenwing.gif';
                gifElement.className = 'tiny-gif';
                document.body.appendChild(gifElement);

                // Randomize position around the edges
                const position = Math.floor(Math.random() * 4);
                const offset = Math.random() * 100;

                switch (position) {
                    case 0: // Top
                        gifElement.style.top = `${offset}vh`;
                        gifElement.style.left = `-50px`;
                        break;
                    case 1: // Bottom
                        gifElement.style.bottom = `${offset}vh`;
                        gifElement.style.right = `-50px`;
                        break;
                    case 2: // Left
                        gifElement.style.left = `${offset}vw`;
                        gifElement.style.top = `-50px`;
                        break;
                    case 3: // Right
                        gifElement.style.right = `${offset}vw`;
                        gifElement.style.bottom = `-50px`;
                        break;
                }

                // Animate GIF appearance and disappearance
                gsap.to(gifElement, { opacity: 1, duration: 0.5, x: 60 });
                gsap.to(gifElement, { opacity: 0, delay: 1.5, duration: 0.5, x: 120, onComplete: () => gifElement.remove() });
            }

            // Function to continuously create GIFs
            function startGifLoop() {
                setInterval(() => {
                    createGif();
                }, 500); // Creates a new GIF every 0.5 seconds
            }

            startGifLoop(); // Start the loop after initial animations
        });
    </script>
</body>
</html>
