<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload and View Images</title>
    <script src="https://ucarecdn.com/libs/widget/3.x/uploadcare.full.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: rgba(240, 248, 255, 0.95); /* Almost white blue background color */
            color: #333;
            height: 100%;
            overflow: hidden;
            position: relative;
        }
        .menu-icon {
            position: fixed;
            top: 20px;
            right: 20px;
            cursor: pointer;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            width: 30px;
            height: 30px;
        }
        .menu-icon div {
            width: 100%;
            height: 4px;
            background-color: black;
            transition: all 0.3s ease;
        }
        .menu-icon.open div:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }
        .menu-icon.open div:nth-child(2) {
            opacity: 0;
        }
        .menu-icon.open div:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }
        .nav {
            position: fixed;
            top: 0;
            right: 0;
            height: 100%;
            width: 200px;
            background-color: rgba(0, 0, 0, 0.9);
            padding-top: 60px;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            z-index: 99;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding-left: 20px;
        }
        .nav.open {
            transform: translateX(0);
        }
        .nav a {
            color: #fff;
            text-decoration: none;
            margin: 15px 0;
            font-size: 1.5em;
            font-weight: bold;
            transition: color 0.3s ease;
        }
        .nav a:hover {
            color: #f40000;
        }
        .upload-widget {
            margin: 20px auto;
            text-align: center;
            z-index: 10;
            position: relative;
        }
        .container {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 80vh;
            overflow-y: auto;
            z-index: 10;
            position: relative;
        }
        .image-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            grid-gap: 15px;
            width: 100%;
        }
        .image-gallery img {
            width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            object-fit: cover;
        }
    </style>
</head>
<body>

<div class="menu-icon" id="menuIcon">
    <div></div>
    <div></div>
    <div></div>
</div>

<div class="nav" id="navMenu">
    <a href="index.html" id="homeLink">Home</a>
    <a href="gift.html" id="giftLink">Our Gift</a>
    <a href="images.html" id="imagesLink">Upload Images</a> <!-- Current Page Link -->
</div>

<div class="upload-widget">
    <input type="hidden" id="uploadcare-uploader" role="uploadcare-uploader" data-public-key="8408c4c77a7b4868e631" data-images-only />
</div>

<div class="container">
    <div id="image-gallery" class="image-gallery"></div>
</div>

<script>
    const menuIcon = document.getElementById('menuIcon');
    const navMenu = document.getElementById('navMenu');

    menuIcon.addEventListener('click', () => {
        menuIcon.classList.toggle('open');
        navMenu.classList.toggle('open');
    });

    // Initialize Uploadcare widget
    const widget = uploadcare.Widget('[role=uploadcare-uploader]');

    // When an image is uploaded, display it at the top of the gallery
    widget.onUploadComplete(info => {
        displayImage(info.cdnUrl);

        // Reinitialize the widget to ensure it remains visible and functional
        widget.value(null); // Reset the widget to its initial state
    });

    // Function to display an image at the top of the gallery
    function displayImage(url) {
        const img = document.createElement('img');
        img.src = url;
        const gallery = document.getElementById('image-gallery');
        gallery.insertBefore(img, gallery.firstChild);
    }

    // Fetch and display all existing images from Uploadcare
    async function fetchImages() {
        try {
            const response = await fetch('https://api.uploadcare.com/files/?limit=100', {
                headers: {
                    'Authorization': 'Uploadcare.Simple 8408c4c77a7b4868e631:8c53c1021464a64101ff'
                }
            });

            if (response.ok) {
                const data = await response.json();
                console.log('Fetched files:', data); // Debugging line
                data.results.forEach(file => {
                    if (file.is_image && file.is_ready) {
                        console.log('Displaying image:', file.original_file_url); // Debugging line
                        displayImage(file.original_file_url);
                    }
                });
            } else {
                console.error('Error fetching images:', response.statusText);
            }
        } catch (error) {
            console.error('Fetch error:', error);
        }
    }

    // Fetch images on page load
    fetchImages();
</script>

</body>
</html>
