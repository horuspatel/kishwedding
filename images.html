<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload and View Images</title>
    <script src="https://ucarecdn.com/libs/widget/3.x/uploadcare.full.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #fff;
            color: #333;
        }
        .header {
            background-color: #f40000;
            padding: 20px;
            text-align: center;
            color: white;
        }
        .header h1 {
            margin: 0;
            font-size: 2em;
        }
        .home-button {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background-color: #fff;
            color: #f40000;
            text-decoration: none;
            border-radius: 5px;
            font-size: 1.2em;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            transition: background-color 0.3s ease;
        }
        .home-button:hover {
            background-color: #d00000;
            color: white;
        }
        .upload-widget {
            margin: 20px auto;
            text-align: center;
        }
        .image-gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }
        .image-gallery img {
            margin: 10px;
            max-width: 200px;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .container {
            overflow-y: auto;
            max-height: 80vh;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Upload and View Images</h1>
    <a href="index.html" class="home-button">Home</a>
</div>

<div class="upload-widget">
    <input type="hidden" role="uploadcare-uploader" data-public-key="8408c4c77a7b4868e631" data-images-only />
</div>

<div class="container">
    <div id="image-gallery" class="image-gallery"></div>
</div>

<script>
    // Initialize Uploadcare widget
    const widget = uploadcare.Widget('[role=uploadcare-uploader]');

    // When an image is uploaded, display it at the top of the gallery
    widget.onUploadComplete(info => {
        displayImage(info.cdnUrl);
    });

    // Function to display an image at the top of the gallery
    function displayImage(url) {
        const img = document.createElement('img');
        img.src = url;
        img.style.maxWidth = '200px';
        img.style.margin = '10px';
        img.style.borderRadius = '10px';
        img.style.boxShadow = '0 0 10px rgba(0,0,0,0.1)';
        const gallery = document.getElementById('image-gallery');
        gallery.insertBefore(img, gallery.firstChild);
    }

    // Fetch and display all existing images from Uploadcare
    async function fetchImages() {
        try {
            const response = await fetch('https://api.uploadcare.com/files/?limit=100', {
                headers: {
                    'Authorization': 'Uploadcare.Simple 8408c4c77a7b4868e631:8c53c1021464a64101ff'
                }
            });

            if (response.ok) {
                const data = await response.json();
                console.log('Fetched files:', data); // Debugging line
                data.results.forEach(file => {
                    if (file.is_image && file.is_ready) {
                        console.log('Displaying image:', file.cdn_url); // Debugging line
                        displayImage(file.cdn_url);
                    }
                });
            } else {
                console.error('Error fetching images:', response.statusText);
            }
        } catch (error) {
            console.error('Fetch error:', error);
        }
    }

    // Fetch images on page load
    fetchImages();
</script>

</body>
</html>
